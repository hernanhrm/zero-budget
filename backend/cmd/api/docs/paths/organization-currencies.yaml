paths:
  /v1/organization-currencies:
    get:
      summary: Find all organization currencies
      tags:
        - Organization Currencies
      parameters:
        - name: relations
          in: query
          required: false
          description: |
            Comma-separated relation names to embed in each item. Use `currencies` to include nested
            currency name, symbol, and decimal places (null when omitted).
          schema:
            type: string
            example: currencies
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of organization currencies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../openapi.yaml#/components/schemas/OrganizationCurrency'
    post:
      summary: Create a new organization currency
      tags:
        - Organization Currencies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/CreateOrganizationCurrency'
      responses:
        '201':
          description: Organization currency created successfully

  /v1/organization-currencies/{id}:
    get:
      summary: Find organization currency by ID
      tags:
        - Organization Currencies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relations
          in: query
          required: false
          description: |
            Comma-separated relation names. Use `currencies` to include nested currency details.
          schema:
            type: string
            example: currencies
      responses:
        '200':
          description: Organization currency found
          content:
            application/json:
              schema:
                $ref: '../openapi.yaml#/components/schemas/OrganizationCurrency'
        '404':
          description: Organization currency not found

    put:
      summary: Update organization currency
      tags:
        - Organization Currencies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/UpdateOrganizationCurrency'
      responses:
        '204':
          description: Organization currency updated successfully

    delete:
      summary: Delete organization currency
      tags:
        - Organization Currencies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Organization currency deleted successfully
