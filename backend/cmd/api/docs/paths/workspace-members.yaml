paths:
  /v1/workspaces/{slug}/members:
    get:
      summary: Find all members in a workspace
      tags:
        - Workspace Members
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: relations
          in: query
          description: Comma-separated list of relations to include (e.g. "user", "role", "user,role")
          schema:
            type: string
            example: "user,role"
      responses:
        '200':
          description: List of workspace members. When relations are requested, each member includes the related objects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkspaceMemberRelation'
    post:
      summary: Add a member to a workspace
      tags:
        - Workspace Members
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceMember'
      responses:
        '201':
          description: Member added successfully

  /v1/workspaces/{slug}/members/find:
    get:
      summary: Find workspace member by user ID
      tags:
        - Workspace Members
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: relations
          in: query
          description: Comma-separated list of relations to include (e.g. "user", "role", "user,role")
          schema:
            type: string
            example: "user,role"
      responses:
        '200':
          description: Workspace member found. When relations are requested, the response includes the related objects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMemberRelation'
        '404':
          description: Workspace member not found

    put:
      summary: Update workspace member role
      tags:
        - Workspace Members
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceMember'
      responses:
        '204':
          description: Workspace member updated successfully

    delete:
      summary: Remove member from workspace
      tags:
        - Workspace Members
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Member removed successfully
