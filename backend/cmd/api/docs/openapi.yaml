openapi: 3.0.0
info:
  title: Zero Budget API
  description: API documentation for Zero Budget application
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://zero-budget-production.up.railway.app
    description: Production server
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the service
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /v1/email-templates:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates'
  /v1/email-templates/{id}:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates~1{id}'
  /v1/email-templates/{id}/logs:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates~1{id}~1logs'

x-tagGroups:
  - name: Notifications
    tags:
      - Email Templates
      - Email Logs

components:
  schemas:
    # Email Template schemas
    EmailTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
          nullable: true
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10
        isOrganizationTemplate:
          type: boolean
          description: Whether this template is duplicated for each new organization
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEmailTemplate:
      type: object
      required:
        - id
        - event
        - name
        - subject
        - content
      properties:
        id:
          type: string
          format: uuid
          description: Client-provided unique identifier
        workspaceId:
          type: string
          format: uuid
          nullable: true
          description: Leave null for global templates
        event:
          type: string
          minLength: 1
          maxLength: 100
          description: Custom event identifier (e.g., "user.welcome")
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          description: Email body content with Go template syntax
        isActive:
          type: boolean
          default: true
        locale:
          type: string
          default: 'en'
        isOrganizationTemplate:
          type: boolean
          default: false
          description: Whether this template should be duplicated for each new organization

    UpdateEmailTemplate:
      type: object
      properties:
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10

    # Email Log schemas
    EmailLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
          minLength: 1
          maxLength: 100
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string
        sentAt:
          type: string
          format: date-time

    CreateEmailLog:
      type: object
      required:
        - id
        - templateId
        - workspaceId
        - recipientEmail
        - event
        - subject
        - content
        - status
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string

    UpdateEmailLog:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string
