openapi: 3.0.0
info:
  title: Zero Budget API
  description: API documentation for Zero Budget application
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the service
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /v1/email-templates:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates'
  /v1/email-templates/{id}:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates~1{id}'
  /v1/email-templates/{id}/logs:
    $ref: './paths/email-templates.yaml#/paths/~1v1~1email-templates~1{id}~1logs'

  /v1/currencies:
    $ref: './paths/currencies.yaml#/paths/~1v1~1currencies'
  /v1/currencies/{code}:
    $ref: './paths/currencies.yaml#/paths/~1v1~1currencies~1{code}'
  /v1/organization-currencies:
    $ref: './paths/organization-currencies.yaml#/paths/~1v1~1organization-currencies'
  /v1/organization-currencies/{id}:
    $ref: './paths/organization-currencies.yaml#/paths/~1v1~1organization-currencies~1{id}'
  /v1/accounts:
    $ref: './paths/accounts.yaml#/paths/~1v1~1accounts'
  /v1/accounts/{id}:
    $ref: './paths/accounts.yaml#/paths/~1v1~1accounts~1{id}'
  /v1/categories:
    $ref: './paths/categories.yaml#/paths/~1v1~1categories'
  /v1/categories/{id}:
    $ref: './paths/categories.yaml#/paths/~1v1~1categories~1{id}'
  /v1/budgets:
    $ref: './paths/budgets.yaml#/paths/~1v1~1budgets'
  /v1/budgets/{id}:
    $ref: './paths/budgets.yaml#/paths/~1v1~1budgets~1{id}'
  /v1/transactions:
    $ref: './paths/transactions.yaml#/paths/~1v1~1transactions'
  /v1/transactions/{id}:
    $ref: './paths/transactions.yaml#/paths/~1v1~1transactions~1{id}'

x-tagGroups:
  - name: Notifications
    tags:
      - Email Templates
      - Email Logs
  - name: Budget
    tags:
      - Currencies
      - Organization Currencies
      - Accounts
      - Categories
      - Budgets
      - Transactions

components:
  schemas:
    # Email Template schemas
    EmailTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
          nullable: true
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10
        isOrganizationTemplate:
          type: boolean
          description: Whether this template is duplicated for each new organization
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEmailTemplate:
      type: object
      required:
        - id
        - event
        - name
        - subject
        - content
      properties:
        id:
          type: string
          format: uuid
          description: Client-provided unique identifier
        workspaceId:
          type: string
          format: uuid
          nullable: true
          description: Leave null for global templates
        event:
          type: string
          minLength: 1
          maxLength: 100
          description: Custom event identifier (e.g., "user.welcome")
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          description: Email body content with Go template syntax
        isActive:
          type: boolean
          default: true
        locale:
          type: string
          default: 'en'
        isOrganizationTemplate:
          type: boolean
          default: false
          description: Whether this template should be duplicated for each new organization

    UpdateEmailTemplate:
      type: object
      properties:
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10

    # Email Log schemas
    EmailLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
          minLength: 1
          maxLength: 100
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string
        sentAt:
          type: string
          format: date-time

    CreateEmailLog:
      type: object
      required:
        - id
        - templateId
        - workspaceId
        - recipientEmail
        - event
        - subject
        - content
        - status
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string

    UpdateEmailLog:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [pending, sent, failed, delivered]
        errorMessage:
          type: string

    # Currency schemas
    Currency:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        symbol:
          type: string
        decimalPlaces:
          type: integer

    # Organization Currency schemas
    CreateOrganizationCurrency:
      type: object
      required:
        - id
        - organizationId
        - currencyCode
        - isBase
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        currencyCode:
          type: string
          minLength: 3
          maxLength: 3
        isBase:
          type: boolean

    UpdateOrganizationCurrency:
      type: object
      properties:
        isBase:
          type: boolean

    OrganizationCurrency:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        currencyCode:
          type: string
        isBase:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Account schemas
    CreateAccount:
      type: object
      required:
        - id
        - organizationId
        - name
        - type
        - currencyCode
        - isActive
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        name:
          type: string
        type:
          type: string
        institution:
          type: string
          maxLength: 255
        accountNumber:
          type: string
          maxLength: 64
        currencyCode:
          type: string
        currentBalance:
          type: integer
          format: int64
          description: Minor units (smallest currency unit), e.g. USD cents; see backend/infra/money
        currentBalanceDecimal:
          type: string
          maxLength: 64
          description: When non-empty, parsed as a decimal major-unit amount (e.g. "12.34") and converted to minor units; overrides currentBalance
        isActive:
          type: boolean

    UpdateAccount:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        institution:
          type: string
          maxLength: 255
        accountNumber:
          type: string
          maxLength: 64
        currencyCode:
          type: string
        currentBalance:
          type: integer
          format: int64
          description: Minor units (smallest currency unit), e.g. USD cents; see backend/infra/money
        isActive:
          type: boolean

    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        name:
          type: string
        type:
          type: string
        institution:
          type: string
          maxLength: 255
        accountNumber:
          type: string
          maxLength: 64
        currencyCode:
          type: string
        currentBalance:
          type: integer
          format: int64
          description: Minor units (smallest currency unit), e.g. USD cents; see backend/infra/money
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Category schemas
    CreateCategory:
      type: object
      required:
        - id
        - organizationId
        - name
        - isActive
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        isActive:
          type: boolean

    UpdateCategory:
      type: object
      properties:
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        isActive:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        parentId:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        icon:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Budget schemas
    CreateBudget:
      type: object
      required:
        - id
        - organizationId
        - name
        - month
        - year
        - currencyCode
        - isActive
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        name:
          type: string
        month:
          type: integer
        year:
          type: integer
        currencyCode:
          type: string
        isActive:
          type: boolean

    UpdateBudget:
      type: object
      properties:
        name:
          type: string
        isActive:
          type: boolean

    Budget:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        name:
          type: string
        month:
          type: integer
        year:
          type: integer
        currencyCode:
          type: string
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # Transaction schemas
    CreateTransaction:
      type: object
      required:
        - id
        - organizationId
        - accountId
        - type
        - amount
        - date
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        accountId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        subcategoryId:
          type: string
          format: uuid
          nullable: true
        budgetId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        amount:
          type: integer
          format: int64
        description:
          type: string
          nullable: true
        externalReferenceNumber:
          type: string
          nullable: true
        date:
          type: string
          format: date

    UpdateTransaction:
      type: object
      properties:
        categoryId:
          type: string
          format: uuid
          nullable: true
        subcategoryId:
          type: string
          format: uuid
          nullable: true
        budgetId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        amount:
          type: integer
          format: int64
        description:
          type: string
          nullable: true
        externalReferenceNumber:
          type: string
          nullable: true
        date:
          type: string
          format: date

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organizationId:
          type: string
        accountId:
          type: string
          format: uuid
        categoryId:
          type: string
          format: uuid
          nullable: true
        subcategoryId:
          type: string
          format: uuid
          nullable: true
        budgetId:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
        amount:
          type: integer
          format: int64
        description:
          type: string
          nullable: true
        externalReferenceNumber:
          type: string
          nullable: true
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
