openapi: 3.0.0
info:
  title: Zero Budget API
  description: API documentation for Zero Budget application
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://zero-budget-production.up.railway.app
    description: Production server
paths:
  /health:
    get:
      summary: Health check
      description: Returns the health status of the service
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /v1/email-templates:
    get:
      summary: Find all email templates
      tags:
        - Email Templates
      parameters:
        - name: workspaceId
          in: query
          schema:
            type: string
            format: uuid
        - name: event
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailTemplate'
    post:
      summary: Create a new email template
      tags:
        - Email Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmailTemplate'
      responses:
        '201':
          description: Email template created successfully
  /v1/email-templates/{id}:
    get:
      summary: Find email template by ID
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Email template found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
        '404':
          description: Email template not found
    put:
      summary: Update email template
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailTemplate'
      responses:
        '204':
          description: Email template updated successfully
    delete:
      summary: Delete email template
      tags:
        - Email Templates
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Email template deleted successfully
  /v1/email-templates/{id}/logs:
    get:
      summary: Find all logs for an email template
      tags:
        - Email Logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - sent
              - failed
              - delivered
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of email logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailLog'
components:
  schemas:
    EmailTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
          nullable: true
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateEmailTemplate:
      type: object
      required:
        - id
        - event
        - name
        - subject
        - content
      properties:
        id:
          type: string
          format: uuid
          description: Client-provided unique identifier
        workspaceId:
          type: string
          format: uuid
          nullable: true
          description: Leave null for global templates
        event:
          type: string
          minLength: 1
          maxLength: 100
          description: Custom event identifier (e.g., "user.welcome")
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
          description: Email body content with Go template syntax
        isActive:
          type: boolean
          default: true
        locale:
          type: string
          default: en
    UpdateEmailTemplate:
      type: object
      properties:
        event:
          type: string
          minLength: 1
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
        subject:
          type: string
          minLength: 1
          maxLength: 500
        content:
          type: string
        isActive:
          type: boolean
        locale:
          type: string
          minLength: 2
          maxLength: 10
    EmailLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
          minLength: 1
          maxLength: 100
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum:
            - pending
            - sent
            - failed
            - delivered
        errorMessage:
          type: string
        sentAt:
          type: string
          format: date-time
    CreateEmailLog:
      type: object
      required:
        - id
        - templateId
        - workspaceId
        - recipientEmail
        - event
        - subject
        - content
        - status
      properties:
        id:
          type: string
          format: uuid
        templateId:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        recipientEmail:
          type: string
          format: email
        event:
          type: string
        subject:
          type: string
        content:
          type: string
        status:
          type: string
          enum:
            - pending
            - sent
            - failed
            - delivered
        errorMessage:
          type: string
    UpdateEmailLog:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - pending
            - sent
            - failed
            - delivered
        errorMessage:
          type: string
x-tagGroups:
  - name: Notifications
    tags:
      - Email Templates
      - Email Logs
