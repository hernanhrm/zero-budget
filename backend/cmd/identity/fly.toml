# Fly.io app config. Run deploys from this directory (Docker build context).
# Rename the app with: fly apps create <name> then set `app` below, or fly launch.

app = "zero-budget-identity"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Single Machine in the pool (no spare for HA). Use with min_machines_running = 0 for scale-to-zero.
# If an extra Machine already exists: fly scale count 1 -a zero-budget-identity
[deploy]
  ha = false

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Scale to zero when idle: no Machines left running in the primary region (lower cost; cold starts on traffic).
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    timeout = "15s"
    path = "/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
