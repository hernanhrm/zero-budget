name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.12"
          cache-dependency-path: backend/**/go.sum

      - name: Go build, test, and vet
        working-directory: backend
        run: |
          go build ./cmd/api/...
          go test ./...
          go vet ./...

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Frontend lint, build, checks, and tests
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm exec turbo run lint build check typecheck
          pnpm --filter app test
