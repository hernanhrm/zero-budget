name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cmd/identity
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}

      - name: Deploy to Cloudflare Container Apps
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}"
          echo "To deploy manually:"
          echo "1. Go to Cloudflare Dashboard > Container Apps"
          echo "2. Create new container app"
          echo "3. Use image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}"
          echo "4. Set env vars in the dashboard"