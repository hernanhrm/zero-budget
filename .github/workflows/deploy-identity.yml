name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity
  IMAGE_TAG: registry.cloudflare.com/${{ secrets.CF_ACCOUNT_ID }}/identity:sha-${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build and push to Cloudflare Registry
        run: |
          cd backend/cmd/identity
          docker build -t ${{ env.IMAGE_TAG }} .
          wrangler containers push ${{ env.IMAGE_TAG }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Display image info
        run: |
          echo "Image pushed to: ${{ env.IMAGE_TAG }}"
          echo ""
          echo "To deploy as a Container, create a Worker with this image in wrangler.toml:"
          echo '[[containers]]'
          echo 'image = "${{ env.IMAGE_TAG }}"'