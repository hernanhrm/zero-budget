name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Build identity service
        run: |
          cd backend/cmd/identity
          npm install
          npm run build
        env:
          DATABASE_URL: ${{ secrets.IDENTITY_DATABASE_URL }}

      - name: Deploy to Cloudflare
        run: |
          cd backend/cmd/identity
          wrangler deploy --account-id ${{ secrets.CF_ACCOUNT_ID }}
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DATABASE_URL: ${{ secrets.IDENTITY_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.IDENTITY_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.IDENTITY_BETTER_AUTH_URL }}
          TRUSTED_ORIGINS: ${{ secrets.IDENTITY_TRUSTED_ORIGINS }}
          CORS_ORIGIN: ${{ secrets.IDENTITY_CORS_ORIGIN }}
          APP_URL: ${{ secrets.IDENTITY_APP_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.IDENTITY_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.IDENTITY_GOOGLE_CLIENT_SECRET }}
          GITHUB_CLIENT_ID: ${{ secrets.IDENTITY_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.IDENTITY_GITHUB_CLIENT_SECRET }}