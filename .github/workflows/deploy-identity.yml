name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity
  IMAGE_TAG: registry.cloudflare.com/${{ secrets.CF_ACCOUNT_ID }}/identity:sha-${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Cloudflare Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cloudflare.com
          username: ${{ secrets.CF_ACCOUNT_ID }}
          password: ${{ secrets.CF_API_TOKEN }}

      - name: Build and push to Cloudflare Registry
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cmd/identity
          push: true
          tags: ${{ env.IMAGE_TAG }}

      - name: Display image info
        run: |
          echo "Image pushed to: ${{ env.IMAGE_TAG }}"