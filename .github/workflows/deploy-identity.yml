name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - "backend/cmd/identity/**"
      - ".github/workflows/deploy-identity.yml"
  workflow_dispatch:

concurrency:
  group: deploy-identity-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/cmd/identity/package-lock.json

      - name: Install dependencies
        working-directory: backend/cmd/identity
        run: npm ci

      - name: Build TypeScript (identity app image)
        working-directory: backend/cmd/identity
        run: npm run build

      - name: Deploy Worker and container
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend/cmd/identity
          command: deploy
