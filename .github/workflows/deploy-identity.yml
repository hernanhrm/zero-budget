name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cmd/identity
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}

      - name: Deploy to Cloudflare Container Apps
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:${{ github.sha }}"
          
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CF_ACCOUNT_ID }}/container/apps" \
            -d '{
              "name": "${{ env.SERVICE_NAME }}",
              "image": "'"$IMAGE_TAG"'",
              "region": "us-east-1",
              "env_vars": {
                "DATABASE_URL": {"value": "${{ secrets.IDENTITY_DATABASE_URL }}"},
                "BETTER_AUTH_SECRET": {"value": "${{ secrets.IDENTITY_BETTER_AUTH_SECRET }}"},
                "BETTER_AUTH_URL": {"value": "${{ secrets.IDENTITY_BETTER_AUTH_URL }}"},
                "TRUSTED_ORIGINS": {"value": "${{ secrets.IDENTITY_TRUSTED_ORIGINS }}"},
                "CORS_ORIGIN": {"value": "${{ secrets.IDENTITY_CORS_ORIGIN }}"},
                "APP_URL": {"value": "${{ secrets.IDENTITY_APP_URL }}"},
                "PORT": {"value": "8081"}
              }
            }' | jq .