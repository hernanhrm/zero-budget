name: Deploy Identity Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/cmd/identity/**'
      - '.github/workflows/deploy-identity.yml'

env:
  SERVICE_NAME: identity
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate with GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cmd/identity
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}

      - name: Deploy to Cloudflare Container Apps
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/identity:sha-${{ github.sha }}"
          
          npx wrangler container-apps deploy \
            --account-id ${{ secrets.CF_ACCOUNT_ID }} \
            --name ${{ env.SERVICE_NAME }} \
            --image $IMAGE_TAG \
            --region us-east-1 \
            --env DATABASE_URL=${{ secrets.IDENTITY_DATABASE_URL }} \
            --env BETTER_AUTH_SECRET=${{ secrets.IDENTITY_BETTER_AUTH_SECRET }} \
            --env BETTER_AUTH_URL=${{ secrets.IDENTITY_BETTER_AUTH_URL }} \
            --env TRUSTED_ORIGINS=${{ secrets.IDENTITY_TRUSTED_ORIGINS }} \
            --env CORS_ORIGIN=${{ secrets.IDENTITY_CORS_ORIGIN }} \
            --env APP_URL=${{ secrets.IDENTITY_APP_URL }} \
            --port 8081
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}