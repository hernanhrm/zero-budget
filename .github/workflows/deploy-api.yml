name: Deploy API Service

on:
  push:
    branches:
      - main
    paths:
      - "backend/cmd/api/**"
      - "backend/internal/**"
      - "backend/pkg/**"
      - "backend/go.work"
      - "backend/go.work.sum"
      - "backend/.dockerignore"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Requires a User API token from Profile → API Tokens (not only Account API Tokens).
  # Use template "Edit Cloudflare Workers", scoped to the same account as CLOUDFLARE_ACCOUNT_ID.
  # If you see API 10000 (workers upload) or 9106 (/memberships): recreate the token with that template
  # and add User → User Details → Read if Wrangler still calls /memberships. Docs:
  # https://developers.cloudflare.com/workers/ci-cd/external-cicd/github-actions/
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/cmd/api/package-lock.json

      - name: Install dependencies
        working-directory: backend/cmd/api
        run: npm ci

      - name: Typecheck Worker
        working-directory: backend/cmd/api
        run: npm run typecheck

      # Wrangler requires CLOUDFLARE_API_TOKEN; support legacy CF_* secret names from earlier workflows.
      - name: Check Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Set repository secret CLOUDFLARE_API_TOKEN (or legacy CF_API_TOKEN). See https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Set repository secret CLOUDFLARE_ACCOUNT_ID (or legacy CF_ACCOUNT_ID)."
            exit 1
          fi

      # Explicit account_id avoids some /memberships failures (e.g. API 9106) with certain token types.
      - name: Write account_id into wrangler.jsonc
        working-directory: backend/cmd/api
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        run: |
          python3 <<'PY'
          import json
          import os
          import pathlib

          path = pathlib.Path("wrangler.jsonc")
          data = json.loads(path.read_text())
          data["account_id"] = os.environ["CLOUDFLARE_ACCOUNT_ID"].strip()
          path.write_text(json.dumps(data, indent=2) + "\n")
          PY

      - name: Deploy Worker and container
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.CF_ACCOUNT_ID }}
          workingDirectory: backend/cmd/api
          command: deploy
